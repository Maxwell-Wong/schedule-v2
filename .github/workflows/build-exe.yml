name: Build Schedule Generator EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build unified EXE with PyInstaller
      run: |
        pyinstaller --onefile --console --name schedule-generator --add-data "data;data" --add-data "config.ini;." --add-data "prompt_part1_fixed_rules.md;." --add-data "prompt_part2_variables.md;." --add-data "prompt_part3_output_rules.md;." --add-data "prompt_weekend_time_rules.md;." main.py

    - name: Rename EXE with version
      run: |
        if ("${{ github.ref }}" -match "refs/tags/v*") {
          $version = "${{ github.ref }}" -replace "refs/tags/v", ""
          $date = Get-Date -Format "yyyyMMdd"
          Move-Item dist/schedule-generator.exe "dist/schedule-generator-$version-$date.exe"
        } else {
          $date = Get-Date -Format "yyyyMMdd"
          $commit = "${{ github.sha }}".Substring(0, 7)
          Move-Item dist/schedule-generator.exe "dist/schedule-generator-latest-$date-$commit.exe"
        }

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: schedule-generator-exe
        path: dist/schedule-generator-*.exe
        retention-days: 90

    - name: Create Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/schedule-generator-*.exe
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
