name: Build Schedule Generator EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --console --name schedule-v2 `
          --add-data "data;data" `
          --add-data "config.ini;." `
          --add-data "prompt_part1_fixed_rules.md;." `
          --add-data "prompt_part2_variables.md;." `
          --add-data "prompt_part3_output_rules.md;." `
          --add-data "prompt_weekend_time_rules.md;." `
          --add-data "prompt_weekday_weekend_separation.md;." `
          --add-data "prompt_work_order_uniqueness.md;." `
          --hidden-import=json_to_xlsx `
          --hidden-import=openpyxl `
          --hidden-import=pandas `
          --hidden-import=openai `
          call_ai.py

    - name: Rename EXE with version
      run: |
        if ("${{ github.ref }}" -match "refs/tags/v*") {
          $version = "${{ github.ref }}" -replace "refs/tags/v", ""
          Move-Item dist/schedule-v2.exe "dist/schedule-v2-$version.exe"
        } else {
          Move-Item dist/schedule-v2.exe "dist/schedule-v2-latest.exe"
        }

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: schedule-v2-windows-exe
        path: dist/schedule-v2-*.exe
        retention-days: 30

    - name: Create Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/schedule-v2-*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
