name: Build Schedule Generator EXE

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build call_ai EXE with PyInstaller
      run: |
        pyinstaller --onefile --console --name schedule-call-ai --add-data "data;data" --add-data "config.ini;." --add-data "prompt_part1_fixed_rules.md;." --add-data "prompt_part2_variables.md;." --add-data "prompt_part3_output_rules.md;." --add-data "prompt_weekend_time_rules.md;." call_ai.py

    - name: Build json_to_xlsx EXE with PyInstaller
      run: |
        pyinstaller --onefile --console --name schedule-json-to-xlsx --add-data "data;data" json_to_xlsx.py

    - name: Rename EXE with version
      run: |
        if ("${{ github.ref }}" -match "refs/tags/v*") {
          $version = "${{ github.ref }}" -replace "refs/tags/v", ""
          Move-Item dist/schedule-call-ai.exe "dist/schedule-call-ai-$version.exe"
          Move-Item dist/schedule-json-to-xlsx.exe "dist/schedule-json-to-xlsx-$version.exe"
        } else {
          Move-Item dist/schedule-call-ai.exe "dist/schedule-call-ai-latest.exe"
          Move-Item dist/schedule-json-to-xlsx.exe "dist/schedule-json-to-xlsx-latest.exe"
        }

    - name: Upload EXE artifacts
      uses: actions/upload-artifact@v4
      with:
        name: schedule-windows-exe
        path: dist/*.exe
        retention-days: 30

    - name: Create Release (if tagged)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
