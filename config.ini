[paths]
# 输入文件路径
input_file = data/sheet_input.xlsx

# 输出文件路径
output_file = output_transformed.xlsx

# 规则文件路径
rules_file = transform_sheet_rules.md

[api]
# Nvidia API 配置
api_key = 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
base_url = https://integrate.api.nvidia.com/v1
# 使用 8b 模型以提高速度
model = qwen/qwen3.5-122b-a10b
# 最大输出tokens（设置为更大的值，避免截断）
max_tokens = 16000
temperature = 0.1


[settings]
# 是否启用 AI 自动修改代码
enable_ai_modify = true

# 每周四的人数参数（用于工单分配）
# 如果周四人数为6，那么当天的工单按6人平均分配
thursday_person_count = 3

[filter]
# 数据过滤规则
# 移除工单状态为以下值的行（逗号分隔）
removed_status = 已撤銷

# 移除提单所属团队为以下值的行（逗号分隔）
removed_teams = 安全內控團隊,前端網络團隊,系統平臺團隊

# 是否移除'序号'列
remove_serial_column = true
